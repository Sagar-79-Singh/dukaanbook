<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DukaanBook — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height: 100vh;
  background: #0f1117;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans', sans-serif;
  padding: 20px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 60% 20%, rgba(245,166,35,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(59,130,246,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.card {
  background: #181b24;
  border: 1px solid #2a2f45;
  border-radius: 20px;
  padding: 44px 40px;
  width: 100%;
  max-width: 400px;
  position: relative;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon { font-size: 48px; margin-bottom: 8px; }
.logo-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: #f5a623;
  letter-spacing: 0.5px;
}
.logo-sub { font-size: 13px; color: #5a6178; margin-top: 4px; }

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #5a6178;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 7px;
}
.form-input {
  width: 100%;
  background: #1e2130;
  border: 1.5px solid #2a2f45;
  border-radius: 10px;
  padding: 12px 14px;
  color: #f0f2f8;
  font-family: 'Noto Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: #f5a623; }
.form-input::placeholder { color: #3a3f55; }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #f5a623, #e8630a);
  border: none;
  border-radius: 10px;
  padding: 14px;
  color: #0f1117;
  font-family: 'Baloo 2', sans-serif;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: #ef4444;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 12px;
  display: none;
  text-align: center;
}
.footer { text-align: center; margin-top: 24px; font-size: 12px; color: #3a3f55; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div class="logo-title">DukaanBook</div>
    <div class="logo-sub">Stationery Shop Manager</div>
  </div>
  <div class="form-group">
    <label class="form-label">Username</label>
    <input type="text" class="form-input" id="username" placeholder="admin ya dad" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Login Karo →</button>
  <div class="error-msg" id="errMsg"></div>
  <div class="footer">DukaanBook v1.0 • Patna</div>
</div>
<script>
const API = '/api';

// Already logged in?
if (localStorage.getItem('db_token')) window.location.href = '/app.html';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.querySelector('.btn-login');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';
  if (!username || !password) { showErr('Username aur password dono dalo'); return; }
  btn.textContent = 'Logging in...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed'); return; }
    localStorage.setItem('db_token', data.token);
    localStorage.setItem('db_user', data.username);
    localStorage.setItem('db_role', data.role);
    window.location.href = '/app.html';
  } catch (e) {
    showErr('Server se connect nahi ho pa raha. Baad mein try karo.');
  } finally {
    btn.textContent = 'Login Karo →';
    btn.disabled = false;
  }
}

function showErr(msg) {
  const err = document.getElementById('errMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
